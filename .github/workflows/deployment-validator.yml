name: "Tool 1: Cloudflare Pages Deployment Validator"

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate-deployment:
    name: Validate Deployment Content
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment propagation
        run: sleep 60

      - name: Fetch content from both domains
        id: fetch
        run: |
          echo "Fetching content from daribati.ae..."
          curl -s -L --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://daribati.ae" > /tmp/custom_domain.html || echo "FETCH_FAILED" > /tmp/custom_domain.html

          echo "Fetching content from daribati-nextjs.pages.dev..."
          curl -s -L --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://daribati-nextjs.pages.dev" > /tmp/pages_dev.html || echo "FETCH_FAILED" > /tmp/pages_dev.html

          # Extract titles
          CUSTOM_TITLE=$(grep -oP '(?<=<title>).*?(?=</title>)' /tmp/custom_domain.html | head -1 || echo "NO_TITLE")
          PAGES_TITLE=$(grep -oP '(?<=<title>).*?(?=</title>)' /tmp/pages_dev.html | head -1 || echo "NO_TITLE")
          echo "custom_title=$CUSTOM_TITLE" >> $GITHUB_OUTPUT
          echo "pages_title=$PAGES_TITLE" >> $GITHUB_OUTPUT

          # Generate content hashes (strip dynamic content like nonces)
          CUSTOM_HASH=$(sed 's/nonce="[^"]*"//g; s/data-n-[a-z]*="[^"]*"//g' /tmp/custom_domain.html | md5sum | cut -d' ' -f1)
          PAGES_HASH=$(sed 's/nonce="[^"]*"//g; s/data-n-[a-z]*="[^"]*"//g' /tmp/pages_dev.html | md5sum | cut -d' ' -f1)
          echo "custom_hash=$CUSTOM_HASH" >> $GITHUB_OUTPUT
          echo "pages_hash=$PAGES_HASH" >> $GITHUB_OUTPUT

          # Extract script paths for comparison
          grep -oP 'src="/_next/static/[^"]*"' /tmp/custom_domain.html | sort > /tmp/custom_scripts.txt || true
          grep -oP 'src="/_next/static/[^"]*"' /tmp/pages_dev.html | sort > /tmp/pages_scripts.txt || true

          # Compare script paths
          if diff -q /tmp/custom_scripts.txt /tmp/pages_scripts.txt > /dev/null 2>&1; then
            echo "scripts_match=true" >> $GITHUB_OUTPUT
          else
            echo "scripts_match=false" >> $GITHUB_OUTPUT
            echo "Script differences:"
            diff /tmp/custom_scripts.txt /tmp/pages_scripts.txt || true
          fi

      - name: Evaluate results
        id: evaluate
        run: |
          MISMATCH=false
          REASONS=""

          # Check titles
          if [ "${{ steps.fetch.outputs.custom_title }}" != "${{ steps.fetch.outputs.pages_title }}" ]; then
            MISMATCH=true
            REASONS="${REASONS}\n- Title mismatch: '${{ steps.fetch.outputs.custom_title }}' vs '${{ steps.fetch.outputs.pages_title }}'"
          fi

          # Check content hashes
          if [ "${{ steps.fetch.outputs.custom_hash }}" != "${{ steps.fetch.outputs.pages_hash }}" ]; then
            MISMATCH=true
            REASONS="${REASONS}\n- Content hash mismatch: ${{ steps.fetch.outputs.custom_hash }} vs ${{ steps.fetch.outputs.pages_hash }}"
          fi

          # Check script paths
          if [ "${{ steps.fetch.outputs.scripts_match }}" = "false" ]; then
            MISMATCH=true
            REASONS="${REASONS}\n- Script bundle paths differ between domains"
          fi

          echo "mismatch=$MISMATCH" >> $GITHUB_OUTPUT
          echo "reasons<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REASONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ "$MISMATCH" = "true" ]; then
            echo "::warning::Deployment content mismatch detected!"
          else
            echo "✅ Deployment content matches between both domains"
          fi

      - name: Create alert issue on mismatch
        if: steps.evaluate.outputs.mismatch == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Deployment Mismatch: daribati.ae ≠ pages.dev`;
            const body = `## Deployment Content Mismatch Detected

            **Time:** ${new Date().toISOString()}
            **Commit:** ${context.sha}
            **Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            ### Mismatches Found
            ${process.env.REASONS}

            ### Details
            | Domain | Title | Content Hash |
            |--------|-------|--------------|
            | daribati.ae | ${process.env.CUSTOM_TITLE} | ${process.env.CUSTOM_HASH} |
            | pages.dev | ${process.env.PAGES_TITLE} | ${process.env.PAGES_HASH} |

            ### Recommended Actions
            1. Purge Cloudflare cache for daribati.ae
            2. Check for stale Worker routes intercepting traffic
            3. Verify custom domain is pointing to latest deployment
            4. Run the Cache Buster workflow manually
            `;

            // Avoid duplicate issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment-mismatch'
            });

            const recent = issues.data.find(i => {
              const created = new Date(i.created_at);
              return (Date.now() - created.getTime()) < 3600000; // 1 hour
            });

            if (recent) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: recent.number,
                body: `Still mismatched at ${new Date().toISOString()}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['deployment-mismatch', 'automated']
              });
            }
        env:
          REASONS: ${{ steps.evaluate.outputs.reasons }}
          CUSTOM_TITLE: ${{ steps.fetch.outputs.custom_title }}
          PAGES_TITLE: ${{ steps.fetch.outputs.pages_title }}
          CUSTOM_HASH: ${{ steps.fetch.outputs.custom_hash }}
          PAGES_HASH: ${{ steps.fetch.outputs.pages_hash }}
