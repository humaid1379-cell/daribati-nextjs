name: Fix WAF - Allow Bots v2

on:
  workflow_dispatch:

jobs:
  fix-waf:
    name: Fix WAF Rules - Allow Verified Bots
    runs-on: ubuntu-latest
    steps:
      - name: Audit all WAF rule locations
        id: audit
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          echo "=== Waiting to avoid rate limits ==="
          sleep 5

          echo "=== 1. Check old Firewall Rules API ==="
          FW_RULES=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/firewall/rules?per_page=100" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")
          echo "Firewall rules success: $(echo "$FW_RULES" | jq -r '.success')"
          echo "Firewall rules count: $(echo "$FW_RULES" | jq '.result | length')"
          echo "$FW_RULES" | jq '.result[] | {id: .id, description: .description, action: .action}' 2>/dev/null || echo "No rules"

          sleep 3

          echo ""
          echo "=== 2. Check all Rulesets ==="
          ALL_RULESETS=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/rulesets" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")
          echo "Rulesets success: $(echo "$ALL_RULESETS" | jq -r '.success')"
          echo "$ALL_RULESETS" | jq '.result[] | {id: .id, name: .name, phase: .phase, kind: .kind}' 2>/dev/null || echo "No rulesets"

          sleep 3

          echo ""
          echo "=== 3. Check WAF Custom Rules Phase ==="
          WAF_CUSTOM=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/rulesets/phases/http_request_firewall_custom/entrypoint" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")
          echo "WAF custom success: $(echo "$WAF_CUSTOM" | jq -r '.success')"
          echo "$WAF_CUSTOM" | jq '.result | {id: .id, rules_count: (.rules | length)}' 2>/dev/null || echo "No custom WAF ruleset"
          echo "$WAF_CUSTOM" | jq '.result.rules[] | {id: .id, description: .description, action: .action, expression: .expression}' 2>/dev/null || echo "No rules in custom WAF"

          sleep 3

          echo ""
          echo "=== 4. Check Bot Management / Security Level ==="
          SEC_LEVEL=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/settings/security_level" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")
          echo "Security level: $(echo "$SEC_LEVEL" | jq -r '.result.value')"

          sleep 3

          echo ""
          echo "=== 5. Check Bot Fight Mode ==="
          BOT_FIGHT=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/settings/bot_fight_mode" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")
          echo "Bot fight mode: $(echo "$BOT_FIGHT" | jq -r '.result.value // .result // "N/A"')"

          # Save key data for next steps
          FW_RULES_COUNT=$(echo "$FW_RULES" | jq '.result | length')
          echo "fw_rules_count=$FW_RULES_COUNT" >> $GITHUB_OUTPUT

          WAF_RULESET_ID=$(echo "$WAF_CUSTOM" | jq -r '.result.id // empty')
          echo "waf_ruleset_id=$WAF_RULESET_ID" >> $GITHUB_OUTPUT

          WAF_RULES_COUNT=$(echo "$WAF_CUSTOM" | jq '.result.rules | length // 0')
          echo "waf_rules_count=$WAF_RULES_COUNT" >> $GITHUB_OUTPUT

          # Check if there's a geo-challenge in old firewall rules
          GEO_FW_RULE=$(echo "$FW_RULES" | jq -r '.result[] | select(.action == "managed_challenge" or .action == "challenge") | .id' 2>/dev/null | head -1)
          echo "geo_fw_rule=$GEO_FW_RULE" >> $GITHUB_OUTPUT

      - name: Fix WAF - Add bot skip rule using old Firewall Rules API
        id: fix_old_api
        if: steps.audit.outputs.fw_rules_count != '0'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          echo "=== Found rules in old Firewall Rules API, adding bot exception ==="
          sleep 5

          # Check if bot exception already exists
          EXISTING=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/firewall/rules?per_page=100" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")

          BOT_RULE_EXISTS=$(echo "$EXISTING" | jq -r '.result[] | select(.description == "Allow verified bots - bypass WAF") | .id' 2>/dev/null || echo "")
          echo "Existing bot rule: $BOT_RULE_EXISTS"

          if [ -n "$BOT_RULE_EXISTS" ]; then
            echo "Bot exception rule already exists!"
            echo "created=already_exists" >> $GITHUB_OUTPUT
            exit 0
          fi

          sleep 3

          # First create a filter for verified bots
          echo "=== Creating filter for verified bots ==="
          FILTER_RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/filters" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '[{
              "expression": "(cf.client.bot) or (http.user_agent contains \"Googlebot\") or (http.user_agent contains \"bingbot\") or (http.user_agent contains \"Baiduspider\") or (http.user_agent contains \"YandexBot\") or (http.user_agent contains \"DuckDuckBot\") or (http.user_agent contains \"Slurp\") or (http.user_agent contains \"facebookexternalhit\") or (http.user_agent contains \"Applebot\")",
              "description": "Verified search engine bots"
            }]')

          echo "Filter response:"
          echo "$FILTER_RESPONSE" | jq '.'

          FILTER_ID=$(echo "$FILTER_RESPONSE" | jq -r '.result[0].id // empty')
          echo "Filter ID: $FILTER_ID"

          if [ -z "$FILTER_ID" ]; then
            echo "Failed to create filter"
            echo "created=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          sleep 3

          # Create firewall rule with "allow" action using the filter
          echo "=== Creating allow rule for verified bots ==="
          RULE_RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/firewall/rules" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[{
              \"filter\": {\"id\": \"${FILTER_ID}\"},
              \"action\": \"allow\",
              \"description\": \"Allow verified bots - bypass WAF\",
              \"priority\": 1
            }]")

          echo "Rule response:"
          echo "$RULE_RESPONSE" | jq '.'

          RULE_SUCCESS=$(echo "$RULE_RESPONSE" | jq -r '.success')
          echo "created=$RULE_SUCCESS" >> $GITHUB_OUTPUT

          if [ "$RULE_SUCCESS" = "true" ]; then
            echo "✅ Bot allow rule created successfully!"
          else
            echo "❌ Failed to create bot allow rule"
          fi

      - name: Fix WAF - Add bot skip rule using new Rulesets API
        id: fix_new_api
        if: steps.audit.outputs.fw_rules_count == '0'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          echo "=== Using new Rulesets API to add bot skip rule ==="
          sleep 5

          RULESET_ID="${{ steps.audit.outputs.waf_ruleset_id }}"

          BOT_SKIP_RULE='{
            "action": "skip",
            "action_parameters": {"ruleset": "current"},
            "expression": "(cf.client.bot) or (http.user_agent contains \"Googlebot\") or (http.user_agent contains \"bingbot\") or (http.user_agent contains \"Baiduspider\") or (http.user_agent contains \"YandexBot\") or (http.user_agent contains \"DuckDuckBot\") or (http.user_agent contains \"Slurp\") or (http.user_agent contains \"facebookexternalhit\") or (http.user_agent contains \"Applebot\")",
            "description": "Allow verified bots - skip geo challenge",
            "enabled": true
          }'

          if [ -n "$RULESET_ID" ]; then
            echo "Updating existing ruleset: $RULESET_ID"
            # Get existing rules first
            EXISTING=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/rulesets/${RULESET_ID}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json")
            EXISTING_RULES=$(echo "$EXISTING" | jq -c '.result.rules // []')

            sleep 3

            NEW_RULES=$(echo "$EXISTING_RULES" | jq --argjson bot_rule "$BOT_SKIP_RULE" '[$bot_rule] + .')

            RESPONSE=$(curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/rulesets/${RULESET_ID}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"rules\": $NEW_RULES}")
          else
            echo "Creating new ruleset with bot skip rule"
            RESPONSE=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/rulesets" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"Custom WAF Rules\",
                \"kind\": \"zone\",
                \"phase\": \"http_request_firewall_custom\",
                \"rules\": [$BOT_SKIP_RULE]
              }")
          fi

          echo "Response:"
          echo "$RESPONSE" | jq '.'

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          echo "created=$SUCCESS" >> $GITHUB_OUTPUT

          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Bot skip rule created successfully!"
          else
            echo "❌ Failed to create bot skip rule"
            exit 1
          fi

      - name: Purge Cloudflare cache
        id: purge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          echo "=== Purging Cloudflare cache ==="
          sleep 5

          PURGE_RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}')

          echo "Purge response:"
          echo "$PURGE_RESPONSE" | jq '.'

          PURGE_SUCCESS=$(echo "$PURGE_RESPONSE" | jq -r '.success')
          echo "purge_success=$PURGE_SUCCESS" >> $GITHUB_OUTPUT

          if [ "$PURGE_SUCCESS" = "true" ]; then
            echo "✅ Cache purged successfully!"
          else
            echo "⚠️ Cache purge result: $PURGE_SUCCESS"
          fi

      - name: Test site accessibility
        id: test_site
        run: |
          echo "=== Testing site accessibility ==="
          sleep 15

          # Test with Googlebot UA
          GOOGLE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)" \
            "https://daribati.ae" || echo "000")
          echo "Googlebot UA: HTTP $GOOGLE_CODE"

          # Test with regular browser UA
          BROWSER_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            "https://daribati.ae" || echo "000")
          echo "Browser UA: HTTP $BROWSER_CODE"

          # Check response headers
          echo ""
          echo "=== Response headers for Googlebot ==="
          curl -sI -L --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)" \
            "https://daribati.ae" | head -15

          echo "google_code=$GOOGLE_CODE" >> $GITHUB_OUTPUT
          echo "browser_code=$BROWSER_CODE" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## WAF Fix v2 Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "- Old firewall rules found: ${{ steps.audit.outputs.fw_rules_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- WAF ruleset ID: ${{ steps.audit.outputs.waf_ruleset_id || 'None' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Fix Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cache purged | ${{ steps.purge.outputs.purge_success == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Googlebot HTTP code | ${{ steps.test_site.outputs.google_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser HTTP code | ${{ steps.test_site.outputs.browser_code }} |" >> $GITHUB_STEP_SUMMARY
