name: Domain Sync Verification

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  verify-redirects:
    name: Verify Domain Redirects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify www.daribati.ae redirects to daribati.ae
        id: www_redirect
        run: |
          echo "Checking www.daribati.ae redirect..."
          REDIRECT_URL=$(curl -s -o /dev/null -w "%{redirect_url}" --max-time 15 "https://www.daribati.ae" || echo "FAILED")
          FINAL_URL=$(curl -s -o /dev/null -w "%{url_effective}" -L --max-time 30 "https://www.daribati.ae" || echo "FAILED")
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 30 "https://www.daribati.ae" || echo "000")

          echo "Redirect URL: $REDIRECT_URL"
          echo "Final URL: $FINAL_URL"
          echo "HTTP Code: $HTTP_CODE"

          if echo "$FINAL_URL" | grep -q "https://daribati.ae"; then
            echo "✅ www.daribati.ae correctly redirects to daribati.ae"
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "❌ www.daribati.ae does NOT redirect to daribati.ae"
            echo "Final URL was: $FINAL_URL"
            echo "status=fail" >> $GITHUB_OUTPUT
          fi

      - name: Verify Pages deployment matches latest commit
        id: pages_check
        run: |
          echo "Checking daribati-nextjs.pages.dev..."
          PAGES_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://daribati-nextjs.pages.dev" || echo "000")
          echo "Pages HTTP Code: $PAGES_CODE"

          LATEST_COMMIT="${{ github.sha }}"
          echo "Latest commit: $LATEST_COMMIT"

          # Check if the pages.dev site is accessible
          if [ "$PAGES_CODE" -ge 200 ] && [ "$PAGES_CODE" -lt 400 ]; then
            echo "✅ daribati-nextjs.pages.dev is accessible (HTTP $PAGES_CODE)"
            echo "status=accessible" >> $GITHUB_OUTPUT
          else
            echo "❌ daribati-nextjs.pages.dev returned HTTP $PAGES_CODE"
            echo "status=inaccessible" >> $GITHUB_OUTPUT
          fi

          # Try to get deployment info from Cloudflare API
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            DEPLOY_INFO=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/daribati-nextjs/deployments?sort_by=created_on&sort_order=desc&per_page=1" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json")
            
            DEPLOY_COMMIT=$(echo "$DEPLOY_INFO" | jq -r '.result[0].deployment_trigger.metadata.commit_hash // "unknown"')
            DEPLOY_STATUS=$(echo "$DEPLOY_INFO" | jq -r '.result[0].latest_stage.status // "unknown"')
            
            echo "Latest deployment commit: $DEPLOY_COMMIT"
            echo "Deployment status: $DEPLOY_STATUS"
            echo "deploy_commit=$DEPLOY_COMMIT" >> $GITHUB_OUTPUT
            echo "deploy_status=$DEPLOY_STATUS" >> $GITHUB_OUTPUT

            if [ "$DEPLOY_COMMIT" = "$LATEST_COMMIT" ]; then
              echo "✅ Deployment matches latest commit"
              echo "sync=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Deployment may not match latest commit"
              echo "sync=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Report results
        if: always()
        run: |
          echo "## Domain Sync Verification Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| www → apex redirect | ${{ steps.www_redirect.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pages.dev accessible | ${{ steps.pages_check.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment in sync | ${{ steps.pages_check.outputs.sync || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Latest commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Deploy commit: ${{ steps.pages_check.outputs.deploy_commit || 'N/A' }}" >> $GITHUB_STEP_SUMMARY

      - name: Alert on failure
        if: steps.www_redirect.outputs.status == 'fail' || steps.pages_check.outputs.status == 'inaccessible'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ Domain Sync Issue Detected`;
            const body = `## Domain Sync Verification Failed

            | Check | Status |
            |-------|--------|
            | www → apex redirect | ${{ steps.www_redirect.outputs.status }} |
            | Pages.dev accessible | ${{ steps.pages_check.outputs.status }} |
            | Deployment in sync | ${{ steps.pages_check.outputs.sync || 'N/A' }} |

            **Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['domain-sync', 'automated']
            });
